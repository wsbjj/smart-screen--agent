name: Build installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows 11 exe
            os: windows-latest
            command: npm run package:win
            artifact: windows-exe
          - name: macOS arm64 dmg
            os: macos-26
            command: npm run package:mac:arm64
            artifact: macos-arm64-dmg

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: ${{ matrix.command }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error
