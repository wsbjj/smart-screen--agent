name: Build installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows 11 exe
            os: windows-latest
            command: npm run package:win
            artifact: windows-exe
          - name: macOS arm64 dmg
            os: macos-26
            command: npm run package:mac:arm64
            artifact: macos-arm64-dmg
          - name: Linux x64 AppImage and deb
            os: ubuntu-latest
            command: npm run package:linux
            artifact: linux-x64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - run: npm ci

      - run: ${{ matrix.command }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
